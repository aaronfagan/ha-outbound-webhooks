name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: It must compile
        run: python -m compileall -q custom_components/outbound_webhooks

      - uses: home-assistant/actions/hassfest@master

      - uses: hacs/action@main
        with:
          category: integration

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements-test.txt

      - run: pytest -q
