send:
  fields:
    url:
      required: true
      example: "https://api.example.com/hook"
      selector:
        text:
    method:
      required: true
      default: GET
      selector:
        select:
          mode: dropdown
          options:
            - "GET"
            - "POST"
            - "PUT"
            - "PATCH"
            - "DELETE"
    headers:
      required: true
      selector:
        object:
          multiple: true
          label_field: key
          fields:
            key:
              label: Key
              selector:
                text:
            value:
              label: Value
              selector:
                text:
    auth_type:
      required: true
      default: none
      selector:
        select:
          mode: dropdown
          options:
            - value: none
              label: None
            - value: bearer
              label: Bearer token
            - value: x_api_key
              label: X-API-Key
    credential:
      required: true
      selector:
        text:
          type: password
    payload:
      required: true
      selector:
        template:
    content_type:
      required: true
      default: application/json
      selector:
        select:
          custom_value: true
          options:
            - application/json
            - application/x-www-form-urlencoded
            - text/plain
    timeout:
      required: true
      default: 10
      selector:
        number:
          min: 1
          max: 300
          unit_of_measurement: seconds
          mode: box
    verify_ssl:
      required: true
      default: true
      selector:
        boolean:
    follow_redirects:
      required: true
      default: true
      selector:
        boolean:

send_preset:
  fields:
    preset:
      required: true
      selector:
        config_entry:
          integration: outbound_webhooks
